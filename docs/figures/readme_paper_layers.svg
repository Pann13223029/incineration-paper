<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Paper repo layers</title>
  <desc id="desc">Diagram showing the active paper layer, canonical evidence layer, and reference thesis layer of the paper-focused repository.</desc>
  <rect x="0" y="0" width="1200" height="620" fill="#fbfaf7"/>
  <rect x="24" y="24" width="1152" height="572" rx="22" fill="#ffffff" stroke="#d7d1c7" stroke-width="2"/>
  <text x="60" y="74" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#1f2937">How This Repo Is Organized</text>
  <text x="60" y="110" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#4b5563">The paper lives on top of the thesis evidence base. The old thesis machinery stays available, but only as reference.</text>

  <rect x="80" y="160" width="1040" height="120" rx="20" fill="#eef2f9" stroke="#5373a6" stroke-width="2"/>
  <text x="110" y="205" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#284c7a">Active Paper Layer</text>
  <text x="110" y="242" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#374151">paper/manuscript/  •  paper/notes/  •  paper/journals/  •  paper/supplement/  •  paper/evidence/</text>
  <text x="110" y="268" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#4b5563">This is where the article gets written, narrowed, and targeted to journals.</text>

  <rect x="80" y="312" width="1040" height="120" rx="20" fill="#eef4f1" stroke="#4d7c6a" stroke-width="2"/>
  <text x="110" y="357" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#1f5c4d">Canonical Evidence Layer</text>
  <text x="110" y="394" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#374151">code/  •  data/  •  output/</text>
  <text x="110" y="420" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#4b5563">These files remain the source of truth for results, sample definitions, and model outputs.</text>

  <rect x="80" y="464" width="1040" height="100" rx="20" fill="#f4efe7" stroke="#b38f5a" stroke-width="2"/>
  <text x="110" y="509" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#7c4a17">Reference Thesis Layer</text>
  <text x="110" y="544" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#374151">thesis/  •  research/</text>
  <text x="360" y="544" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#4b5563">kept for traceability, supervisor history, and defense context</text>

  <path d="M600 280 L600 312" stroke="#6b7280" stroke-width="3" fill="none"/>
  <polygon points="600,312 593,298 607,298" fill="#6b7280"/>
  <path d="M600 432 L600 464" stroke="#6b7280" stroke-width="3" fill="none"/>
  <polygon points="600,464 593,450 607,450" fill="#6b7280"/>
</svg>
