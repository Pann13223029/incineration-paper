<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" rx="32" fill="#FBF8F1"/>
  <rect x="58" y="58" width="1484" height="784" rx="30" fill="white" stroke="#E6DDD1"/>

  <text x="98" y="118" fill="#C8643B" font-family="Avenir Next, Segoe UI, sans-serif" font-size="26" font-weight="800" letter-spacing="2">EVENT-LEVEL PATHWAY AUDIT</text>
  <text x="98" y="164" fill="#12303A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="40" font-weight="800">The audit bounds mechanism claims instead of overstating them</text>

  <rect x="98" y="224" width="1404" height="112" rx="28" fill="#F3EEE5"/>
  <rect x="98" y="224" width="817.1" height="112" rx="28" fill="#1E6A6D"/>
  <rect x="915.1" y="224" width="379.1" height="112" fill="#C8643B"/>
  <rect x="1294.2" y="224" width="199.8" height="112" rx="28" fill="#D8A54D"/>
  <rect x="1494" y="224" width="8" height="112" rx="28" fill="#8D9AA0"/>

  <text x="126" y="289" fill="white" font-family="Avenir Next, Segoe UI, sans-serif" font-size="34" font-weight="800">Reset / rebuild-like 82</text>
  <text x="944" y="289" fill="white" font-family="Avenir Next, Segoe UI, sans-serif" font-size="30" font-weight="800">Continuity 38</text>
  <text x="1320" y="289" fill="#12303A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="26" font-weight="800">Placeholder 20</text>

  <g>
    <rect x="98" y="404" width="428" height="358" rx="28" fill="#F7FBFB" stroke="#D4E5E3"/>
    <text x="128" y="454" fill="#1E6A6D" font-family="Avenir Next, Segoe UI, sans-serif" font-size="22" font-weight="800" letter-spacing="2">RESET / REBUILD-LIKE</text>
    <text x="128" y="528" fill="#12303A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="86" font-weight="900">58.2%</text>
    <text x="128" y="574" fill="#12303A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="28">82 of 141 observed transitions</text>
    <text x="128" y="632" fill="#50626A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24">Requires observed <tspan font-style="italic">year_started</tspan> reset or mature-to-new age reset.</text>
    <text x="128" y="690" fill="#50626A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24">Supports capital-reset prominence, not one uniquely identified mechanism.</text>
  </g>

  <g>
    <rect x="584" y="404" width="428" height="358" rx="28" fill="#FFF7F2" stroke="#F1D7CB"/>
    <text x="614" y="454" fill="#C8643B" font-family="Avenir Next, Segoe UI, sans-serif" font-size="22" font-weight="800" letter-spacing="2">CONTINUITY / IN-PLACE UPGRADE</text>
    <text x="614" y="528" fill="#12303A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="86" font-weight="900">27.0%</text>
    <text x="614" y="574" fill="#12303A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="28">38 of 141 observed transitions</text>
    <text x="614" y="632" fill="#50626A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24">No reset on the event row, consistent with continuity or retrofit-like movement.</text>
    <text x="614" y="690" fill="#50626A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24">Retrofit remains in the story, but it is not the largest observed bucket.</text>
  </g>

  <g>
    <rect x="1070" y="404" width="432" height="358" rx="28" fill="#FFFBEF" stroke="#F0E2B8"/>
    <text x="1100" y="454" fill="#9C7627" font-family="Avenir Next, Segoe UI, sans-serif" font-size="22" font-weight="800" letter-spacing="2">PLACEHOLDER / UNRESOLVED</text>
    <text x="1100" y="528" fill="#12303A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="86" font-weight="900">14.9%</text>
    <text x="1100" y="574" fill="#12303A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="28">21 events left weakly classified</text>
    <text x="1100" y="632" fill="#50626A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24">Forward-dated or ambiguous rows are left unresolved instead of being forced into a stronger claim.</text>
    <text x="1100" y="690" fill="#50626A" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24">This is a conservative shield against overclaiming.</text>
  </g>
</svg>
