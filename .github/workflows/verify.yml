name: Verify Paper Repo

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Tectonic
        uses: wtfjoke/setup-tectonic@v4

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install Python dependencies
        run: .venv/bin/pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Rebuild canonical analysis outputs
        run: |
          .venv/bin/python code/scripts/02_parse_facility_panel.py
          .venv/bin/python code/scripts/03_grid_emission_factors.py
          .venv/bin/python code/scripts/04_eda_facility.py
          .venv/bin/python code/scripts/05a_power_adoption.py
          .venv/bin/python code/scripts/05_panel_regression.py
          .venv/bin/python code/scripts/06_robustness.py
          .venv/bin/python code/scripts/06a_data_quality_sensitivity.py
          .venv/bin/python code/scripts/08_verify_claims.py

      - name: Refresh paper-facing evidence copies
        run: npm run paper:sync

      - name: Export cross-platform submission manuscript artifacts
        run: python3 code/scripts/21_export_paper_submission.py --no-docx --no-pdf

      - name: Build LaTeX manuscript PDF
        run: .venv/bin/python code/scripts/22_build_paper_latex.py

      - name: Ensure tracked outputs are up to date
        run: |
          git diff --exit-code -- . \
            ':(exclude)paper/figures/*.pdf' \
            ':(exclude)paper/figures/*.png' \
            ':(exclude)paper/share/waste-management-manuscript-latex.pdf'

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-verify-artifacts
          path: |
            output/adoption_results.md
            output/regression_results.md
            output/robustness_results.md
            output/data_quality_sensitivity.md
            output/claim_evidence_map.md
            output/claim_verification.md
            paper/evidence/current/
            paper/submission/waste-management-manuscript.md
            paper/submission/waste-management-manuscript.html
            paper/submission/waste-management-manuscript-latex.pdf
            paper/share/waste-management-manuscript-latex.pdf
